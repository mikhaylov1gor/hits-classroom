openapi: 3.0.3
info:
  title: hits-classroom API
  version: 0.3.0
  description: Backend API для LMS (курсы, задания, материалы, посты, оценки, файлы).

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: auth
  - name: users
  - name: courses
  - name: members
  - name: posts
  - name: materials
  - name: assignments
  - name: submissions
  - name: comments
  - name: files

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация (F-16)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created — возвращает JWT токен и профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email уже зарегистрирован

  /auth/login:
    post:
      tags: [auth]
      summary: Авторизация (F-17)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Неверный email или пароль

  # ── Users ─────────────────────────────────────────────────────────────────────

  /users/check-email:
    get:
      tags: [users]
      summary: Проверка существования пользователя по email
      operationId: checkEmailExists
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me:
    get:
      tags: [users]
      summary: Текущий пользователь (профиль)
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [users]
      summary: Редактирование профиля (F-20)
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{userId}/files:
    get:
      tags: [files]
      summary: Список загруженных файлов пользователя
      operationId: listUserFiles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Files ─────────────────────────────────────────────────────────────────────

  /files:
    post:
      tags: [files]
      summary: Загрузка файла
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Файл слишком большой

  /files/{fileId}:
    get:
      tags: [files]
      summary: Скачивание файла
      operationId: downloadFile
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Courses ───────────────────────────────────────────────────────────────────

  /courses:
    get:
      tags: [courses]
      summary: Список курсов текущего пользователя
      operationId: listCourses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [courses]
      summary: Создание класса (F-01), автор = владелец
      operationId: createCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /courses/join:
    post:
      tags: [courses]
      summary: Присоединение по коду приглашения (F-02)
      operationId: joinCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Курс не найден или код неверный

  /courses/{courseId}:
    get:
      tags: [courses]
      summary: Получение курса
      operationId: getCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [courses]
      summary: Переименование класса (F-06), только владелец
      operationId: updateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [courses]
      summary: Удаление класса (F-05), только владелец
      operationId: deleteCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/invite-code:
    get:
      tags: [courses]
      summary: Получение кода приглашения (8 символов) (F-04). Генерирует, если отсутствует.
      operationId: getInviteCode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [courses]
      summary: Перегенерация кода приглашения. Только владелец.
      operationId: regenerateInviteCode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK — новый код
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/feed:
    get:
      tags: [courses]
      summary: Лента постов, материалов и заданий курса (сортировка по дате)
      operationId: getCourseFeed
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Members ───────────────────────────────────────────────────────────────────

  /courses/{courseId}/leave:
    post:
      tags: [members]
      summary: Покинуть курс. Если владелец — должен быть ещё хотя бы один владелец.
      operationId: leaveCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Не участник курса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Нельзя покинуть курс — вы последний владелец
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/members:
    get:
      tags: [members]
      summary: Список участников курса
      operationId: listCourseMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [members]
      summary: Назначить участника преподавателем (F-07). Только владелец.
      operationId: assignTeacher
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTeacherRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members/{userId}:
    delete:
      tags: [members]
      summary: Исключить участника. Владелец — может исключить преподов и студентов. Преподаватель — только студентов.
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members/{userId}/role:
    patch:
      tags: [members]
      summary: Изменить роль участника (owner, teacher, student). Только владелец. При понижении owner проверяется наличие другого владельца.
      operationId: changeMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeMemberRoleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Нельзя понизить последнего владельца
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/members/{userId}/grades:
    get:
      tags: [users]
      summary: Профиль студента в классе — задания с оценками (F-15). Студент видит только свои.
      operationId: getStudentGrades
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionWithAssignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/invite-teacher:
    post:
      tags: [members]
      summary: Пригласить пользователя как учителя по email. Только владелец. Если уже студент — роль обновляется до учителя.
      operationId: inviteTeacher
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeacherRequest"
      responses:
        "200":
          description: OK — участник добавлен или обновлён до учителя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Пользователь с таким email не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Пользователь уже является учителем этого курса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Posts ─────────────────────────────────────────────────────────────────────

  /courses/{courseId}/posts:
    post:
      tags: [posts]
      summary: Создание поста (F-09). Доступно всем участникам курса (owner, teacher, student).
      operationId: createPost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/posts/{postId}:
    get:
      tags: [posts]
      summary: Получение поста с полной информацией (body, links, file_ids)
      operationId: getPost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [posts]
      summary: Удаление поста. Автор поста или owner/teacher курса.
      operationId: deletePost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/posts/{postId}/comments:
    get:
      tags: [comments]
      summary: Комментарии к посту в виде дерева
      operationId: listPostComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [comments]
      summary: Добавить комментарий к посту. Поддерживает вложенность через parent_id.
      operationId: createPostComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Materials ─────────────────────────────────────────────────────────────────

  /courses/{courseId}/materials:
    post:
      tags: [materials]
      summary: Создание материала (F-10). Только owner/teacher.
      operationId: createMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/materials/{materialId}:
    get:
      tags: [materials]
      summary: Получение материала с полной информацией
      operationId: getMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/MaterialId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [materials]
      summary: Удаление материала. Только owner/teacher.
      operationId: deleteMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/MaterialId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/materials/{materialId}/comments:
    get:
      tags: [comments]
      summary: Комментарии к материалу в виде дерева
      operationId: listMaterialComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/MaterialId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [comments]
      summary: Добавить комментарий к материалу. Поддерживает вложенность через parent_id.
      operationId: createMaterialComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/MaterialId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Assignments ───────────────────────────────────────────────────────────────

  /courses/{courseId}/assignments:
    post:
      tags: [assignments]
      summary: Создание задания (F-08). Поддерживает дедлайн (F-18) и шкалу оценки. Только owner/teacher.
      operationId: createAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}:
    get:
      tags: [assignments]
      summary: Получение задания
      operationId: getAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [assignments]
      summary: Удаление задания (каскадно удаляет ответы и комментарии). Только owner/teacher.
      operationId: deleteAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/comments:
    get:
      tags: [comments]
      summary: Комментарии к заданию в виде дерева (F-19). Студент видит публичные + свои приватные.
      operationId: listComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [comments]
      summary: Добавить комментарий к заданию. Поддерживает is_private (личное сообщение преподу).
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/comments/{commentId}:
    delete:
      tags: [comments]
      summary: Удалить комментарий (и все вложенные ответы). Автор или owner/teacher курса.
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Submissions ───────────────────────────────────────────────────────────────

  /courses/{courseId}/assignments/{assignmentId}/submissions:
    get:
      tags: [submissions]
      summary: Список ответов на задание (F-13). Преподаватель/владелец видит все, студент — только свой.
      operationId: listSubmissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [submissions]
      summary: Ответ на задание (F-11). Неизменяем после отправки (F-12).
      operationId: submitAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Ответ уже был отправлен ранее

  /courses/{courseId}/assignments/{assignmentId}/submissions/my:
    get:
      tags: [submissions]
      summary: Получение своего ответа на задание
      operationId: getMySubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Ответ не найден (ещё не отправлен)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/grade:
    put:
      tags: [submissions]
      summary: Выставление оценки (F-14). Оценка от 0 до max_grade задания.
      operationId: gradeSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/return:
    put:
      tags: [submissions]
      summary: Возврат работы студенту на переработку (F-25). Только owner/teacher.
      operationId: returnSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/detach:
    put:
      tags: [submissions]
      summary: Открепить ответ студента (сбросить прикрепление). Только owner/teacher.
      operationId: detachSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetachSubmissionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PostId:
      name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name, birth_date]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer токен
        user:
          $ref: "#/components/schemas/User"

    # ── Users ─────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    CheckEmailResponse:
      type: object
      properties:
        exists:
          type: boolean
          description: true, если пользователь с таким email зарегистрирован

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    # ── Files ─────────────────────────────────────────────────────────────────

    File:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        file_name:
          type: string
        file_size:
          type: integer
          format: int64
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Courses ───────────────────────────────────────────────────────────────

    CreateCourseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string

    JoinCourseRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        invite_code:
          type: string
        created_at:
          type: string
          format: date-time

    CourseWithRole:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            role:
              type: string
              enum: [owner, teacher, student]

    InviteCode:
      type: object
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    FeedItem:
      type: object
      properties:
        type:
          type: string
          enum: [post, material, assignment]
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
          nullable: true
          description: Заполнено только для заданий

    # ── Members ───────────────────────────────────────────────────────────────

    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, teacher, student]

    AssignTeacherRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

    InviteTeacherRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email пользователя, которого нужно пригласить как учителя

    ChangeMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, teacher, student]
          description: Новая роль участника

    # ── Posts ─────────────────────────────────────────────────────────────────

    CreatePostRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: ID пользователя, создавшего пост
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time

    # ── Materials ─────────────────────────────────────────────────────────────

    CreateMaterialRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Material:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time

    # ── Assignments ───────────────────────────────────────────────────────────

    CreateAssignmentRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        deadline:
          type: string
          format: date-time
          nullable: true
        max_grade:
          type: integer
          minimum: 1
          default: 100
          description: "Максимальный балл (шкала оценки). Примеры: 5, 10, 100. По умолчанию 100."

    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        deadline:
          type: string
          format: date-time
          nullable: true
        max_grade:
          type: integer
          description: Максимальный балл по шкале оценки
        created_at:
          type: string
          format: date-time

    # ── Submissions ───────────────────────────────────────────────────────────

    CreateSubmissionRequest:
      type: object
      properties:
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        submitted_at:
          type: string
          format: date-time
        grade:
          type: integer
          minimum: 0
          nullable: true
          description: Оценка в диапазоне [0, max_grade] задания. null — не выставлена.
        grade_comment:
          type: string
          nullable: true
          description: Комментарий преподавателя к оценке

    GradeRequest:
      type: object
      required: [grade]
      properties:
        grade:
          type: integer
          minimum: 0
          description: Оценка в диапазоне [0, max_grade] задания
        grade_comment:
          type: string
          description: Необязательный комментарий преподавателя

    DetachSubmissionRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: ID студента, чей ответ нужно открепить

    SubmissionWithAssignment:
      type: object
      properties:
        submission:
          $ref: "#/components/schemas/Submission"
        assignment:
          $ref: "#/components/schemas/Assignment"

    # ── Comments ──────────────────────────────────────────────────────────────

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID родительского комментария. Если не указан — корневой комментарий.
        is_private:
          type: boolean
          default: false
          description: >-
            Личный комментарий — виден только автору и owner/teacher курса.
            Ответ на приватный комментарий автоматически наследует is_private=true.
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
          description: Непусто для комментариев к заданиям
        post_id:
          type: string
          format: uuid
          description: Непусто для комментариев к постам
        material_id:
          type: string
          format: uuid
          description: Непусто для комментариев к материалам
        user_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID родительского комментария или null для корневых
        is_private:
          type: boolean
          description: >-
            true — личный комментарий. Студент видит только свои приватные ветки,
            преподаватель/владелец видит все.
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        replies:
          type: array
          description: Вложенные ответы (рекурсивно, только в GET-ответах)
          items:
            $ref: "#/components/schemas/Comment"
