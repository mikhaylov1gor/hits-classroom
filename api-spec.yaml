      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/comments/{commentId}:
    delete:
      tags: [comments]
      summary: Удалить комментарий (и все вложенные ответы). Автор или owner/teacher курса.
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Submissions ───────────────────────────────────────────────────────────────

  /courses/{courseId}/assignments/{assignmentId}/submissions:
    get:
      tags: [submissions]
      summary: Список ответов на задание (F-13). Преподаватель/владелец видит все, студент — только свой.
      operationId: listSubmissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [submissions]
      summary: >-
        Сохранить/отправить ответ на задание (F-11, F-12).
        is_attached=false — черновик (можно перезаписывать).
        is_attached=true — финальная сдача; после дедлайна невозможна (409).
        Для групповых заданий финальная сдача доступна только после lock-roster.
      operationId: submitAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            Конфликт: либо ответ уже был финально отправлен,
            либо дедлайн задания истёк (при is_attached=true)

  /courses/{courseId}/assignments/{assignmentId}/submissions/my:
    get:
      tags: [submissions]
      summary: Получение своего ответа на задание
      operationId: getMySubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Ответ не найден (ещё не отправлен)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/files/{fileId}:
    get:
      tags: [submissions]
      summary: >-
        Скачать файл, прикреплённый к решению.
        Owner/teacher видят файлы любого решения.
        Студент — только из своего решения.
      operationId: getSubmissionFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Содержимое файла
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Решение или файл не найдены, либо файл не прикреплён к данному решению
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/grade:
    put:
      tags: [submissions]
      summary: Выставление оценки (F-14). Оценка от 0 до max_grade задания. Для групповых заданий доступно только после lock-roster.
      operationId: gradeSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/return:
    put:
      tags: [submissions]
      summary: Возврат работы студенту на переработку (F-25). Только owner/teacher.
      operationId: returnSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/detach:
    put:
      tags: [submissions]
      summary: Открепить ответ студента (сбросить прикрепление). Только owner/teacher.
      operationId: detachSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetachSubmissionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PostId:
      name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name, birth_date]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer токен
        user:
          $ref: "#/components/schemas/User"

    # ── Users ─────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    CheckEmailResponse:
      type: object
      properties:
        exists:
          type: boolean
          description: true, если пользователь с таким email зарегистрирован

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    # ── Files ─────────────────────────────────────────────────────────────────

    File:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        file_name:
          type: string
        file_size:
          type: integer
          format: int64
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Courses ───────────────────────────────────────────────────────────────

    CreateCourseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string

    JoinCourseRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        invite_code:
          type: string
        created_at:
          type: string
          format: date-time

    CourseWithRole:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            role:
              type: string
              enum: [owner, teacher, student]
            membership_status:
              $ref: "#/components/schemas/CourseMemberStatus"

    InviteCode:
      type: object
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    FeedItem:
      type: object
      properties:
        type:
          type: string
          enum: [post, material, assignment]
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
          nullable: true
          description: Заполнено только для заданий

    # ── Members ───────────────────────────────────────────────────────────────

    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, teacher, student]
        status:
          $ref: "#/components/schemas/CourseMemberStatus"
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
        decided_by:
          type: string
          format: uuid
        decision_note:
          type: string

    CourseMemberStatus:
      type: string
      enum: [pending, approved, rejected]

    JoinRequestDecisionRequest:
      type: object
      properties:
        note:
          type: string

    AssignTeacherRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

    InviteTeacherRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email пользователя, которого нужно пригласить как учителя

    ChangeMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, teacher, student]
          description: Новая роль участника

    # ── Posts ─────────────────────────────────────────────────────────────────

    CreatePostRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: ID пользователя, создавшего пост
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time

    # ── Materials ─────────────────────────────────────────────────────────────

    CreateMaterialRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Material:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time

    # ── Assignments ───────────────────────────────────────────────────────────

    CreateAssignmentRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
          description: Прикреплённые ссылки
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        deadline:
          type: string
          format: date-time
          nullable: true
        max_grade:
          type: integer
          minimum: 1
          default: 100
          description: "Максимальный балл (шкала оценки). Примеры: 5, 10, 100. По умолчанию 100."
        team_distribution_type:
          $ref: "#/components/schemas/TeamDistributionType"
        team_count:
          type: integer
          minimum: 0
          description: Количество команд. Можно указывать вместе с desired_team_size; если оба заданы, team_count имеет приоритет для распределения.
        desired_team_size:
          type: integer
          minimum: 2
          description: Желаемый размер команды. Если team_count не задан, число команд = ceil(студенты / desired_team_size).
        assignment_kind:
          $ref: "#/components/schemas/AssignmentKind"
        team_submission_rule:
          $ref: "#/components/schemas/TeamSubmissionRule"
        vote_tie_break:
          $ref: "#/components/schemas/VoteTieBreak"
        allow_early_finalization:
          type: boolean
          description: Разрешить досрочную финализацию (прикрепление / finalize-vote) до дедлайна.
        team_grading_mode:
          $ref: "#/components/schemas/TeamGradingMode"
        peer_split_min_percent:
          type: number
          format: float
        peer_split_max_percent:
          type: number
          format: float

    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        links:
          type: array
          items:
            type: string
            format: uri
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        deadline:
          type: string
          format: date-time
          nullable: true
        max_grade:
          type: integer
          description: Максимальный балл по шкале оценки
        assignment_kind:
          $ref: "#/components/schemas/AssignmentKind"
        desired_team_size:
          type: integer
        team_distribution_type:
          $ref: "#/components/schemas/TeamDistributionType"
        team_count:
          type: integer
          description: Количество команд (явное значение, используемое для распределения)
        max_team_size:
          type: integer
          description: Максимальный размер команды, рассчитанный по формуле ceil(students/team_count), минимум 2
        team_submission_rule:
          $ref: "#/components/schemas/TeamSubmissionRule"
        vote_tie_break:
          $ref: "#/components/schemas/VoteTieBreak"
        allow_early_finalization:
          type: boolean
        team_grading_mode:
          $ref: "#/components/schemas/TeamGradingMode"
        peer_split_min_percent:
          type: number
          format: float
        peer_split_max_percent:
          type: number
          format: float
        roster_locked_at:
          type: string
          format: date-time
          nullable: true
        deadline_auto_finalized_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Submissions ───────────────────────────────────────────────────────────

    CreateSubmissionRequest:
      type: object
      properties:
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        is_attached:
          type: boolean
          default: false
          description: >-
            false — черновик (можно обновлять, не считается финальной сдачей).
            true — финальная отправка. После дедлайна финальная отправка невозможна.

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        submitted_at:
          type: string
          format: date-time
        is_attached:
          type: boolean
          description: true — финальная отправка (работа сдана)
        is_returned:
          type: boolean
          description: true — работа возвращена преподавателем на доработку
        grade:
          type: integer
          minimum: 0
          nullable: true
          description: Оценка в диапазоне [0, max_grade] задания. null — не выставлена.
        grade_comment:
          type: string
          nullable: true
          description: Комментарий преподавателя к оценке

    GradeRequest:
      type: object
      required: [grade]
      properties:
        grade:
          type: integer
          minimum: 0
          description: Оценка в диапазоне [0, max_grade] задания
        grade_comment:
          type: string
          description: Необязательный комментарий преподавателя

    DetachSubmissionRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
          description: ID студента, чей ответ нужно открепить

    SubmissionWithAssignment:
      type: object
      properties:
        submission:
          $ref: "#/components/schemas/Submission"
        assignment:
          $ref: "#/components/schemas/Assignment"

    TeamDistributionType:
      type: string
      enum: [free, random, balanced, manual]

    AssignmentKind:
      type: string
      enum: [individual, group]

    VoteTieBreak:
      type: string
      enum: [random, highest_author_average]

    TeamGradingMode:
      type: string
      enum: [individual, team_uniform, team_peer_split]

    TeamSubmissionRule:
      type: string
      enum: [first_submission, last_submission, top_student_only, vote_equal, vote_weighted]

    TeamMemberInfo:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        average_score:
          type: number
          format: float

    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        creator_id:
          type: string
          format: uuid
        name:
          type: string
        max_members:
          type: integer
        created_at:
          type: string
          format: date-time

    TeamWithMembers:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/TeamMemberInfo"
            status:
              type: string
              description: >-
                forming | roster_locked | voting_open | voting | submitted | graded | not_submitted

    TeamAuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        event_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    PeerGradeSplitRequest:
      type: object
      required: [percents]
      properties:
        percents:
          type: object
          additionalProperties:
            type: number
            format: float
          description: user_id -> процент доли (сумма 100 ± 0.01)

    GradeTeamPeerSplitRequest:
      type: object
      required: [grade]
      properties:
        grade:
          type: integer
        grade_comment:
          type: string

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
          description: Название команды; если пусто, сервер сгенерирует автоматически

    SaveTeamItem:
      type: object
      properties:
        name:
          type: string
        member_ids:
          type: array
          items:
            type: string
            format: uuid

    SaveTeamsRequest:
      type: object
      required: [teams]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/SaveTeamItem"

    VoteTeamSubmissionRequest:
      type: object
      required: [submission_id]
      properties:
        submission_id:
          type: string
          format: uuid

    TeamSubmissionVoteStats:
      type: object
      properties:
        submission_id:
          type: string
          format: uuid
        vote_weight:
          type: number
          format: float
        vote_count:
          type: integer
        like_count:
          type: integer

    TeamSubmissionForVote:
      type: object
      properties:
        submission:
          $ref: "#/components/schemas/Submission"
        stats:
          $ref: "#/components/schemas/TeamSubmissionVoteStats"

    # ── Comments ──────────────────────────────────────────────────────────────

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID родительского комментария. Если не указан — корневой комментарий.
        is_private:
          type: boolean
          default: false
          description: >-
            Личный комментарий — виден только автору и owner/teacher курса.
            Ответ на приватный комментарий автоматически наследует is_private=true.
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
          description: Непусто для комментариев к заданиям
        post_id:
          type: string
          format: uuid
          description: Непусто для комментариев к постам
        material_id:
          type: string
          format: uuid
          description: Непусто для комментариев к материалам
        user_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID родительского комментария или null для корневых
        is_private:
          type: boolean
          description: >-
            true — личный комментарий. Студент видит приватные ветки, в которых он является участником.
            Преподаватель/владелец видит все приватные комментарии.
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        replies:
          type: array
          description: Вложенные ответы (рекурсивно, только в GET-ответах)
          items:
            $ref: "#/components/schemas/Comment"
