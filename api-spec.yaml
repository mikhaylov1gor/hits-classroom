openapi: 3.0.3
info:
  title: hits-classroom API
  version: 0.5.0
  description: Backend API для LMS (курсы, задания, материалы, посты, оценки, файлы).

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: auth
  - name: users
  - name: courses
  - name: members
  - name: posts
  - name: materials
  - name: assignments
  - name: submissions
  - name: comments
  - name: files
  - name: teams

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация (F-16)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created — возвращает JWT токен и профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email уже зарегистрирован

  /auth/login:
    post:
      tags: [auth]
      summary: Авторизация (F-17)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Неверный email или пароль

  # ── Users ─────────────────────────────────────────────────────────────────────

  /users/check-email:
    get:
      tags: [users]
      summary: Проверка существования пользователя по email
      operationId: checkEmailExists
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me:
    get:
      tags: [users]
      summary: Текущий пользователь (профиль)
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [users]
      summary: Редактирование профиля (F-20)
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{userId}/files:
    get:
      tags: [files]
      summary: Список загруженных файлов пользователя
      operationId: listUserFiles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Files ─────────────────────────────────────────────────────────────────────

  /files:
    post:
      tags: [files]
      summary: Загрузка файла
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Файл слишком большой

  /files/{fileId}:
    get:
      tags: [files]
      summary: Скачивание файла
      operationId: downloadFile
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{fileId}/info:
    get:
      tags: [files]
      summary: Получение метаданных файла (имя, размер, тип). Доступно любому авторизованному пользователю.
      operationId: getFileInfo
      security:
        - bearerAuth: []
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/File"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Courses ───────────────────────────────────────────────────────────────────

  /courses:
    get:
      tags: [courses]
      summary: Список курсов текущего пользователя
      operationId: listCourses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [courses]
      summary: Создание класса (F-01), автор = владелец
      operationId: createCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /courses/join:
    post:
      tags: [courses]
      summary: Присоединение по коду приглашения (F-02)
      operationId: joinCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Курс не найден или код неверный

  /courses/{courseId}:
    get:
      tags: [courses]
      summary: Получение курса
      operationId: getCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [courses]
      summary: Переименование класса (F-06), только владелец
      operationId: updateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [courses]
      summary: Удаление класса (F-05), только владелец
      operationId: deleteCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/invite-code:
    get:
      tags: [courses]
      summary: Получение кода приглашения (8 символов) (F-04). Генерирует, если отсутствует.
      operationId: getInviteCode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [courses]
      summary: Перегенерация кода приглашения. Только владелец.
      operationId: regenerateInviteCode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK — новый код
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/feed:
    get:
      tags: [courses]
      summary: Лента постов, материалов и заданий курса (сортировка по дате)
      operationId: getCourseFeed
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Members ───────────────────────────────────────────────────────────────────

  /courses/{courseId}/leave:
    post:
      tags: [members]
      summary: Покинуть курс. Если владелец — должен быть ещё хотя бы один владелец.
      operationId: leaveCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Не участник курса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Нельзя покинуть курс — вы последний владелец
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/members:
    get:
      tags: [members]
      summary: Список участников курса
      operationId: listCourseMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/join-requests:
    get:
      tags: [members]
      summary: Список заявок на вступление с фильтром по статусу (owner/teacher)
      operationId: listJoinRequests
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CourseMemberStatus"
          description: По умолчанию pending
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/join-requests/{userId}/{action}:
    post:
      tags: [members]
      summary: Подтвердить или отклонить заявку на вступление (owner/teacher)
      operationId: decideJoinRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [approve, reject]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRequestDecisionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/CourseMemberStatus"
                  decided_at:
                    type: string
                    format: date-time
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [members]
      summary: Назначить участника преподавателем (F-07). Только владелец.
      operationId: assignTeacher
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTeacherRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members/{userId}:
    delete:
      tags: [members]
      summary: Исключить участника. Владелец — может исключить преподов и студентов. Преподаватель — только студентов.
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members/{userId}/role:
    patch:
      tags: [members]
      summary: Изменить роль участника (owner, teacher, student). Только владелец. При понижении owner проверяется наличие другого владельца.
      operationId: changeMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeMemberRoleRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Нельзя понизить последнего владельца
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/members/{userId}/grades:
    get:
      tags: [users]
      summary: Профиль студента в классе — задания с оценками (F-15). Студент видит только свои.
      operationId: getStudentGrades
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionWithAssignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/invite-teacher:
    post:
      tags: [members]
      summary: Пригласить пользователя как учителя по email. Только владелец. Если уже студент — роль обновляется до учителя.
      operationId: inviteTeacher
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeacherRequest"
      responses:
        "200":
          description: OK — участник добавлен или обновлён до учителя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Пользователь с таким email не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Пользователь уже является учителем этого курса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Posts ─────────────────────────────────────────────────────────────────────

  /courses/{courseId}/posts:
    post:
      tags: [posts]
      summary: Создание поста (F-09). Доступно всем участникам курса (owner, teacher, student).
      operationId: createPost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/posts/{postId}:
    get:
      tags: [posts]
      summary: Получение поста с полной информацией (body, links, file_ids)
      operationId: getPost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [posts]
      summary: Удаление поста. Автор поста или owner/teacher курса.
      operationId: deletePost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/posts/{postId}/files/{fileId}:
    get:
      tags: [files]
      summary: Скачать файл, прикреплённый к посту. Доступно всем участникам курса.
      operationId: getPostFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Содержимое файла
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Пост или файл не найдены, либо файл не прикреплён к данному посту
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{courseId}/posts/{postId}/comments:
    get:
      tags: [comments]
      summary: Комментарии к посту в виде дерева
      operationId: listPostComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [comments]
