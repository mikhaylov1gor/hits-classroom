openapi: 3.0.3
info:
  title: hits-classroom API
  version: 0.1.0
  description: Backend API для LMS (курсы, задания, материалы, посты, оценки).

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: auth
  - name: users
  - name: courses
  - name: posts
  - name: materials
  - name: assignments
  - name: submissions
  - name: comments

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация (F-16)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already exists

  /auth/login:
    post:
      tags: [auth]
      summary: Авторизация (F-17)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /users/me:
    get:
      tags: [users]
      summary: Текущий пользователь (профиль)
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [users]
      summary: Редактирование профиля (F-20)
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /courses:
    get:
      tags: [courses]
      summary: Список курсов текущего пользователя
      operationId: listCourses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [courses]
      summary: Создание класса (F-01), автор = владелец
      operationId: createCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /courses/join:
    post:
      tags: [courses]
      summary: Присоединение по коду (F-02)
      operationId: joinCourse
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Course not found or invalid code
        "401":
          $ref: "#/components/responses/Unauthorized"

  /courses/{courseId}:
    get:
      tags: [courses]
      summary: Получение курса
      operationId: getCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithRole"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [courses]
      summary: Переименование класса (F-06), только владелец
      operationId: updateCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [courses]
      summary: Удаление класса (F-05), только владелец
      operationId: deleteCourse
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/invite-code:
    get:
      tags: [courses]
      summary: Получение/генерация кода приглашения 8 символов (F-04)
      operationId: getInviteCode
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members:
    get:
      tags: [courses]
      summary: Список участников курса
      operationId: listCourseMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [courses]
      summary: Назначение преподавателей (F-07), только владелец
      operationId: assignTeacher
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTeacherRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/feed:
    get:
      tags: [courses]
      summary: Лента постов, материалов и заданий курса
      operationId: getCourseFeed
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/posts:
    post:
      tags: [posts]
      summary: Создание поста (F-09)
      operationId: createPost
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/materials:
    post:
      tags: [materials]
      summary: Создание материала (F-10)
      operationId: createMaterial
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments:
    post:
      tags: [assignments]
      summary: Создание задания (F-08), дедлайн (F-18)
      operationId: createAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}:
    get:
      tags: [assignments]
      summary: Получение задания
      operationId: getAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/submissions:
    get:
      tags: [submissions]
      summary: Просмотр всех ответов (F-13), преподаватель
      operationId: listSubmissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [submissions]
      summary: Ответ на задание (F-11), неизменяем после отправки (F-12)
      operationId: submitAssignment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already submitted

  /courses/{courseId}/assignments/{assignmentId}/submissions/{submissionId}/grade:
    put:
      tags: [submissions]
      summary: Оценивание 0–100 (F-14)
      operationId: gradeSubmission
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}/comments:
    get:
      tags: [comments]
      summary: Комментарии к заданию (F-19)
      operationId: listComments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [comments]
      summary: Добавить комментарий (текст + файлы)
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/members/{userId}/grades:
    get:
      tags: [users]
      summary: Профиль студента в классе — последние задания с оценками (F-15)
      operationId: getStudentGrades
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CourseId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionWithAssignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name, birth_date]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        birth_date:
          type: string
          format: date

    CreateCourseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string

    JoinCourseRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        invite_code:
          type: string
        created_at:
          type: string
          format: date-time

    CourseWithRole:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            role:
              type: string
              enum: [owner, teacher, student]

    InviteCode:
      type: object
      properties:
        code:
          type: string
          minLength: 8
          maxLength: 8

    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [owner, teacher, student]

    AssignTeacherRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

    FeedItem:
      type: object
      properties:
        type:
          type: string
          enum: [post, material, assignment]
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
          nullable: true

    CreatePostRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time

    CreateMaterialRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Material:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time

    CreateAssignmentRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid
        deadline:
          type: string
          format: date-time
          nullable: true

    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        deadline:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateSubmissionRequest:
      type: object
      properties:
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        body:
          type: string
        submitted_at:
          type: string
          format: date-time
        grade:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true

    GradeRequest:
      type: object
      required: [grade]
      properties:
        grade:
          type: integer
          minimum: 0
          maximum: 100

    SubmissionWithAssignment:
      type: object
      properties:
        submission:
          $ref: "#/components/schemas/Submission"
        assignment:
          $ref: "#/components/schemas/Assignment"

    CreateCommentRequest:
      type: object
      properties:
        body:
          type: string
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        body:
          type: string
        created_at:
          type: string
          format: date-time
